<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Hesitation Engine Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Real Product Card Styling */
        .product-card {
            background: #18181c;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            border: 1px solid #26262b;
            transition: transform 0.3s ease;
        }

        .product-image-placeholder {
            background: linear-gradient(135deg, #2b2b36, #1e1e24);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
        }

        .product-image-placeholder::after {
            content: '🎧';
        }

        .product-info {
            padding: 25px;
        }

        .tag {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { 
            font-size: 22px; 
            margin: 12px 0 6px 0; 
            color: #fff; 
        }

        .rating {
            color: #ffdd57;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .description {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .price { 
            font-size: 28px; 
            font-weight: 800; 
            color: #fff; 
        }

        #buy-now {
            background: #ff4757;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.3);
            letter-spacing: 0.5px;
        }

        /* Live Dashboard Overlay */
        .dashboard {
            margin-top: 25px;
            width: 100%;
            max-width: 380px;
            background: rgba(24, 24, 28, 0.7);
            border-radius: 16px;
            padding: 15px 20px;
            border: 1px dashed #333;
            box-sizing: border-box;
        }

        .dash-title {
            font-size: 12px;
            color: #6b7280;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        .stat-line:last-child { margin-bottom: 0; }
        .val { font-weight: 600; color: #00ffcc; }
        #behavior-status { font-weight: 700; color: #ff4757; }
    </style>
</head>
<body>

    <!-- Real Product Card View -->
    <div class="product-card">
        <div class="product-image-placeholder"></div>
        <div class="product-info">
            <span class="tag">New Release</span>
            <h1>Quantum Sound X7</h1>
            <div class="rating">★★★★★ <span style="color:#6b7280; font-size:12px;">(48 reviews)</span></div>
            <p class="description">Premium wireless gaming headset with active noise cancelling, 60-hour battery life, and spatial audio mechanics.</p>
            
            <div class="price-row">
                <div class="price" id="product-price">$350</div>
            </div>
            
            <button id="buy-now">ADD TO CART</button>
        </div>
    </div>

    <!-- Algorithm Monitor -->
    <div class="dashboard">
        <div class="dash-title">Engine Real-Time Telemetry</div>
        <div class="stat-line">
            <span>Hesitation Index (0-100):</span>
            <span class="val" id="score-val">0</span>
        </div>
        <div class="stat-line">
            <span>Data Confidence:</span>
            <span class="val" id="confidence-val">0.00</span>
        </div>
        <div class="stat-line">
            <span>User State:</span>
            <span id="behavior-status">Analyzing Physics...</span>
        </div>
    </div>

    <script type="module">
        class AdvancedHesitationEngine {
            constructor() {
                this.score = 0;
                this.confidence = 0.0;
                this.status = "Analyzing Physics...";
                
                this.startTime = Date.now();
                this.lastX = null;
                this.lastY = null;
                this.lastTime = Date.now();
                this.lastScrollY = window.scrollY;
                this.isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                
                this.listeners = [];
            }

            onUpdate(callback) { this.listeners.push(callback); }

            triggerUpdate() {
                this.listeners.forEach(cb => cb({
                    score: Math.round(this.score),
                    confidence: parseFloat(this.confidence.toFixed(2)),
                    status: this.status
                }));
            }

            init() {
                if (this.isMobile) {
                    window.addEventListener('scroll', () => this.handleMobileScroll());
                    window.addEventListener('touchstart', () => this.handleTouchStart());
                    window.addEventListener('touchend', () => this.handleTouchEnd());
                } else {
                    window.addEventListener('mousemove', (e) => this.handleDesktopMouse(e));
                }
                setInterval(() => this.checkIdleState(), 1000);
            }

            // Time Guard: Prevents immediate dynamic offers within first 4 seconds of landing
            isTimeGuardActive() {
                return (Date.now() - this.startTime) < 4000;
            }

            handleDesktopMouse(e) {
                const now = Date.now();
                const dt = now - this.lastTime;
                if (dt < 25) return;

                if (this.lastX !== null && this.lastY !== null) {
                    const dx = e.clientX - this.lastX;
                    const dy = e.clientY - this.lastY;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    const speed = distance / dt;

                    if (speed > 0.03 && speed < 0.35 && distance < 12) {
                        // Slowed pacing / micro-adjustments
                        this.score = Math.min(100, this.score + 3);
                        this.confidence = Math.min(1.0, this.confidence + 0.05);
                    } else if (speed > 1.5) {
                        // Resolute, fast movement clears hesitation matrix
                        this.score = Math.max(0, this.score - 10);
                        this.confidence = Math.min(1.0, this.confidence + 0.03);
                    }
                }
                this.lastX = e.clientX;
                this.lastY = e.clientY;
                this.lastTime = now;
                this.updatePsychState();
            }

            handleMobileScroll() {
                const now = Date.now();
                const currentScrollY = window.scrollY;
                const dScroll = Math.abs(currentScrollY - this.lastScrollY);
                const dt = now - this.lastTime;

                if (dt > 0) {
                    const scrollSpeed = dScroll / dt;

                    if (this.isTimeGuardActive()) {
                        // If they just opened the page and scrolled, damp down the score additions significantly
                        this.lastScrollY = currentScrollY;
                        this.lastTime = now;
                        return;
                    }

                    // Strict Mobile Calibration: Captures micro-stalls and reading rhythms
                    if (scrollSpeed > 0.01 && scrollSpeed < 0.25) {
                        this.score = Math.min(100, this.score + 2.5); // Smoother, slower build
                        this.confidence = Math.min(1.0, this.confidence + 0.04);
                    } else if (scrollSpeed > 1.8) {
                        this.score = Math.max(0, this.score - 12);
                    }
                }

                this.lastScrollY = currentScrollY;
                this.lastTime = now;
                this.updatePsychState();
            }

            handleTouchStart() { this.touchStartTime = Date.now(); }

            handleTouchEnd() {
                if (this.isTimeGuardActive()) return;
                const duration = Date.now() - this.touchStartTime;
                // Persistent touch hold down signifies reading friction
                if (duration > 800 && duration < 3000) {
                    this.score = Math.min(100, this.score + 10);
                    this.confidence = Math.min(1.0, this.confidence + 0.10);
                    this.updatePsychState();
                }
            }

            checkIdleState() {
                const elapsed = Date.now() - this.lastTime;
                if (elapsed > 2000) {
                    if (this.isTimeGuardActive()) return;
                    
                    if (this.score > 40) {
                        this.score = Math.min(100, this.score + 1.5);
                        this.confidence = Math.max(0.0, this.confidence - 0.02);
                    } else {
                        this.score = Math.min(50, this.score + 0.5);
                        this.confidence = Math.max(0.0, this.confidence - 0.03);
                    }
                    this.updatePsychState();
                }
            }

            updatePsychState() {
                if (this.score < 30) this.status = "Intentional / Evaluating";
                else if (this.score >= 30 && this.score < 65) this.status = "Deep Reading / Browsing";
                else if (this.score >= 65 && this.score < 85) this.status = "Hesitant (Price Analysis)";
                else this.status = "High Friction / Leaving Cart";
                this.triggerUpdate();
            }
        }

        // UI Binding Implementation
        const engine = new AdvancedHesitationEngine();
        engine.init();

        const btn = document.querySelector('#buy-now');
        const priceTag = document.querySelector('#product-price');
        const scoreDisplay = document.querySelector('#score-val');
        const confidenceDisplay = document.querySelector('#confidence-val');
        const statusDisplay = document.querySelector('#behavior-status');

        let promoTriggered = false;

        engine.onUpdate((metrics) => {
            scoreDisplay.textContent = metrics.score;
            confidenceDisplay.textContent = metrics.confidence.toFixed(2);
            statusDisplay.textContent = metrics.status;

            if (metrics.score < 30) {
                statusDisplay.style.color = "#00ffcc";
                if (!promoTriggered) {
                    btn.style.background = "#ff4757";
                    btn.style.boxShadow = "0 4px 20px rgba(255, 71, 87, 0.3)";
                    btn.textContent = "ADD TO CART";
                    priceTag.innerHTML = "$350";
                }
            } else if (metrics.score >= 30 && metrics.score < 65) {
                statusDisplay.style.color = "#ffdd57";
            } else {
                statusDisplay.style.color = "#ff4757";
                
                // Optimized Conversion Window: Requires high hesitation, solid confidence, and minimum time threshold
                if (metrics.score >= 75 && metrics.confidence >= 0.45 && !promoTriggered && !engine.isTimeGuardActive()) {
                    promoTriggered = true;
                    btn.style.background = "#2ed573";
                    btn.style.boxShadow = "0 4px 20px rgba(46, 213, 115, 0.4)";
                    btn.textContent = "CLAIM 15% HESITATION DISCOUNT";
                    priceTag.innerHTML = `<span style="text-decoration: line-through; color: #6b7280; font-size: 18px; font-weight:400; margin-right:8px;">$350</span>$297`;
                }
            }
        });
    </script>
</body>
</html>
