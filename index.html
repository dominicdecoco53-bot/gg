<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Hesitation Engine Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .product-card {
            background: #18181c;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            border: 1px solid #26262b;
        }

        .product-image-placeholder {
            background: linear-gradient(135deg, #2b2b36, #1e1e24);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-image-placeholder::after { content: '🎧'; }

        .product-info { padding: 25px; }

        .tag {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        h1 { font-size: 22px; margin: 12px 0 6px 0; color: #fff; }
        .rating { color: #ffdd57; font-size: 14px; margin-bottom: 15px; }
        .description { color: #9ca3af; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .price { font-size: 28px; font-weight: 800; color: #fff; }

        #buy-now {
            background: #ff4757;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.3);
        }

        .dashboard {
            margin-top: 25px;
            width: 100%;
            max-width: 380px;
            background: rgba(24, 24, 28, 0.7);
            border-radius: 16px;
            padding: 15px 20px;
            border: 1px dashed #333;
            box-sizing: border-box;
        }

        .dash-title { font-size: 12px; color: #6b7280; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #d1d5db; }
        .val { font-weight: 600; color: #00ffcc; }
        #behavior-status { font-weight: 700; color: #ff4757; }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="product-image-placeholder"></div>
        <div class="product-info">
            <span class="tag">New Release</span>
            <h1>Quantum Sound X7</h1>
            <div class="rating">★★★★★ <span style="color:#6b7280; font-size:12px;">(48 reviews)</span></div>
            <p class="description">Premium wireless gaming headset with active noise cancelling, 60-hour battery life, and spatial audio mechanics.</p>
            <div class="price-row">
                <div class="price" id="product-price">$350</div>
            </div>
            <button id="buy-now">ADD TO CART</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="dash-title">Engine Real-Time Telemetry</div>
        <div class="stat-line"><span>Hesitation Index (0-100):</span><span class="val" id="score-val">0</span></div>
        <div class="stat-line"><span>Data Confidence:</span><span class="val" id="confidence-val">0.00</span></div>
        <div class="stat-line"><span>User State:</span><span id="behavior-status">Analyzing Physics...</span></div>
    </div>

    <script>
        let score = 0;
        let confidence = 0.0;
        let promoTriggered = false;
        let aiCalling = false;

        const btn = document.querySelector('#buy-now');
        const priceTag = document.querySelector('#product-price');
        const scoreDisplay = document.querySelector('#score-val');
        const confidenceDisplay = document.querySelector('#confidence-val');
        const statusDisplay = document.querySelector('#behavior-status');

        let entryTime = Date.now();
        let lastMove = Date.now();
        let moveCount = 0;

        async function updateMetrics(newScore, newConfidence, statusText) {
            if (promoTriggered) return;
            score = Math.min(100, Math.max(0, Math.round(newScore)));
            confidence = Math.min(1.0, Math.max(0.0, parseFloat(newConfidence)));
            
            scoreDisplay.textContent = score;
            confidenceDisplay.textContent = confidence.toFixed(2);
            statusDisplay.textContent = statusText;

            if (score < 40) {
                statusDisplay.style.color = "#00ffcc";
            } else if (score >= 40 && score < 70) {
                statusDisplay.style.color = "#ffdd57";
            } else {
                statusDisplay.style.color = "#ff4757";

                // קריאה חיה למוח של גוגל שהקמנו ב-Vercel!
                if (score >= 70 && confidence >= 0.45 && !aiCalling) {
                    aiCalling = true;
                    statusDisplay.textContent = "AI is generating custom deal...";
                    statusDisplay.style.color = "#ffdd57";

                    try {
                        const response = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ score, confidence })
                        });
                        const data = await response.json();
                        
                        if (data.customOffer) {
                            promoTriggered = true;
                            btn.style.background = "#2ed573";
                            btn.style.boxShadow = "0 4px 20px rgba(46, 213, 115, 0.4)";
                            btn.textContent = data.customOffer.toUpperCase(); // הטקסט שה-AI המציא!
                            priceTag.innerHTML = `<span style="text-decoration: line-through; color: #6b7280; font-size: 18px; font-weight:400; margin-right:8px;">$350</span>$297`;
                            statusDisplay.textContent = "Custom AI Offer Activated!";
                            statusDisplay.style.color = "#2ed573";
                        }
                    } catch (err) {
                        console.error("AI Error:", err);
                    } finally {
                        aiCalling = false;
                    }
                }
            }
        }

        // מדידת תנועה והיסוס
        document.addEventListener('mousemove', (e) => {
            if (promoTriggered || aiCalling) return;
            moveCount++;
            lastMove = Date.now();

            const btnRect = btn.getBoundingClientRect();
            const distance = Math.sqrt(Math.pow(e.clientX - (btnRect.left + btnRect.width/2), 2) + Math.pow(e.clientY - (btnRect.top + btnRect.height/2), 2));

            if (distance < 250) {
                let currentScore = score + 1.2;
                let currentConf = Math.min(1.0, moveCount / 35);
                updateMetrics(currentScore, currentConf, "User is hesitating near button...");
            }
        });

        // מדד זמן - אם הגולש פשוט בוהה במסך
        setInterval(() => {
            if (promoTriggered || aiCalling) return;
            const timePassed = (Date.now() - entryTime) / 1000;
            if (timePassed > 4 && score < 75) {
                let currentScore = score + 6;
                let currentConf = Math.min(1.0, timePassed / 15);
                updateMetrics(currentScore, currentConf, "Staring at the product details...");
            }
        }, 2000);
    </script>
</body>
</html>
